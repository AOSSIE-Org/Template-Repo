name: Release
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
on:
  push:
    tags: ["v*.*.*"]
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write          # [DOCKER] Required for ghcr.io push
      id-token: write          # [SIGNING] Required for cosign keyless signing
    steps:
jobs:
  release:
    name: Release with GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0   # Full history needed for changelog
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020        # [NODE] Remove if not a Node.js project
        with:
          node-version: '20'
      # [PYTHON] Add: actions/setup-python@v5 with python-version: '3.12'
      # [DOCKER] Add: docker/setup-buildx-action@v3 + docker/login-action@v3
      # [GO] Add: actions/setup-go@v5 with go-version: stable
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN: ${{ secrets.NPM_TOKEN }}     # [NODE]
          # DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}  # [DOCKER]